<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Calculadora de emissão de CO2 para diferentes modos de transporte"
    />
    <title>Calculadora de Emissão de CO₂</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <h1 class="header__title">🌱 Calculadora de Emissão de CO₂</h1>
      <p class="header__subtitle"
        >Calcule e compare o impacto ambiental do seu deslocamento com base no
        modo de transporte escolhido</p
      >
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Calculator Form -->
      <form id="calculator-form" class="calculator-form">
        <!-- Origin Input -->
        <div class="calculator-form__group">
          <label for="origin" class="calculator-form__label">Origem</label>
          <input
            type="text"
            id="origin"
            class="calculator-form__input"
            placeholder="Digite a cidade de origem"
            list="cities-list"
            required
          />
        </div>

        <!-- Destination Input -->
        <div class="calculator-form__group">
          <label for="destination" class="calculator-form__label"
            >Destino</label
          >
          <input
            type="text"
            id="destination"
            class="calculator-form__input"
            placeholder="Digite a cidade de destino"
            list="cities-list"
            required
          />
        </div>

        <!-- Datalist for Cities Autocomplete -->
        <datalist id="cities-list"></datalist>

        <!-- Distance Input -->
        <div class="calculator-form__group">
          <label for="distance" class="calculator-form__label"
            >Distância (km)</label
          >
          <input
            type="number"
            id="distance"
            class="calculator-form__input"
            placeholder="A distância será preenchida automaticamente"
            readonly
            min="0"
            step="0.1"
          />
          <small class="calculator-form__helper"
            >A distância será preenchida automaticamente</small
          >
        </div>

        <!-- Manual Distance Checkbox -->
        <div class="calculator-form__checkbox-group">
          <input
            type="checkbox"
            id="manual-distance"
            class="calculator-form__checkbox"
          />
          <label for="manual-distance" class="calculator-form__checkbox-label">
            Inserir distância manualmente
          </label>
        </div>

        <!-- Transport Mode Selector -->
        <fieldset class="calculator-form__fieldset">
          <legend class="calculator-form__legend">Modo de Transporte</legend>
          <div class="calculator-form__transport-grid">
            <!-- Bicycle -->
            <label class="calculator-form__transport-option">
              <input
                type="radio"
                name="transport"
                value="bicycle"
                class="calculator-form__radio"
              />
              <span class="calculator-form__transport-label">🚴 Bicicleta</span>
            </label>

            <!-- Car -->
            <label class="calculator-form__transport-option">
              <input
                type="radio"
                name="transport"
                value="car"
                class="calculator-form__radio"
                checked
              />
              <span class="calculator-form__transport-label">🚗 Carro</span>
            </label>

            <!-- Bus -->
            <label class="calculator-form__transport-option">
              <input
                type="radio"
                name="transport"
                value="bus"
                class="calculator-form__radio"
              />
              <span class="calculator-form__transport-label">🚌 Ônibus</span>
            </label>

            <!-- Truck -->
            <label class="calculator-form__transport-option">
              <input
                type="radio"
                name="transport"
                value="truck"
                class="calculator-form__radio"
              />
              <span class="calculator-form__transport-label">🚚 Caminhão</span>
            </label>
          </div>
        </fieldset>

        <!-- Submit Button -->
        <button type="submit" class="calculator-form__submit">
          Calcular Emissão
        </button>
      </form>

      <!-- Results Section -->
      <section id="results" class="results hidden">
        <div id="results-content" class="results__content"></div>
      </section>

      <!-- Comparation Section -->
      <section id="comparation" class="comparation hidden">
        <div id="comparation-content" class="comparation__content"></div>
      </section>

      <!-- Carbon Credits Section -->
      <section id="carbon-credits" class="carbon-credits hidden">
        <div id="carbon-credits-content" class="carbon-credits__content"></div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p class="footer__text"
        >Desenvolvido com ❤️ por Hugo Pereira para o projeto GitHub Copilot da
        DIO</p
      >
    </footer>

    <!-- Scripts -->
    <script src="js/routes-data.js"></script>
    <script src="js/config.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
